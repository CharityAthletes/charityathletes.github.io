name: CharityAthletes
options:
  bundleIdPrefix: com.charityathletes
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

# ── SPM packages ──────────────────────────────────────────────────────────────
packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

# ── App target ────────────────────────────────────────────────────────────────
targets:
  CharityAthletes:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: ios/CharityAthletes
        excludes:
          - "**/.DS_Store"
          - "Resources/Info.plist"

    entitlements:
      path: ios/CharityAthletes/CharityAthletes.entitlements

    dependencies:
      - package: supabase-swift
        product: Supabase

    settings:
      base:
        PRODUCT_NAME: CharityAthletes
        PRODUCT_BUNDLE_IDENTIFIER: com.charityathletes.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"            # iPhone only
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ios/CharityAthletes/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: BrandOrange
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          ONLY_ACTIVE_ARCH: YES
          ENABLE_TESTABILITY: YES

        Release:
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
          VALIDATE_PRODUCT: YES
          ENABLE_BITCODE: NO

    # xcconfig files inject SUPABASE_URL, SUPABASE_ANON_KEY, BACKEND_URL, STRIPE_PUBLISHABLE_KEY
    configFiles:
      Debug:   ios/Config/Debug.xcconfig
      Release: ios/Config/Release.xcconfig

schemes:
  CharityAthletes:
    build:
      targets:
        CharityAthletes: all
    run:
      config: Debug
      environmentVariables:
        - variable: SUPABASE_URL
          value: ""
          isEnabled: false
        - variable: SUPABASE_ANON_KEY
          value: ""
          isEnabled: false
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
