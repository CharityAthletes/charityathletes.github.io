<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>チャリアス Icon Preview</title>
  <style>
    body { background: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; gap: 24px; }
    .label { color: #666; font-size: 13px; }
    .row { display: flex; align-items: flex-end; gap: 32px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="item">
      <img src="icon.svg" width="256" height="256" style="border-radius:56px; box-shadow:0 8px 32px rgba(0,0,0,0.2)"/>
      <span class="label">256×256</span>
    </div>
    <div class="item">
      <img src="icon.svg" width="120" height="120" style="border-radius:27px; box-shadow:0 4px 16px rgba(0,0,0,0.2)"/>
      <span class="label">120×120</span>
    </div>
    <div class="item">
      <img src="icon.svg" width="60" height="60" style="border-radius:13px; box-shadow:0 2px 8px rgba(0,0,0,0.2)"/>
      <span class="label">60×60</span>
    </div>
    <div class="item">
      <img src="icon.svg" width="29" height="29" style="border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,0.2)"/>
      <span class="label">29×29</span>
    </div>
  </div>
  <p style="color:#999; font-size:12px;">チャリアス · Charity Athletes</p>
</body>
</html>
