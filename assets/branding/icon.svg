  <circle cx="200" cy="760" r="20" fill="white"/>
  <!-- Front wheel -->
  <circle cx="480" cy="760" r="140" fill="none" stroke="white" stroke-width="48"/>
  <circle cx="480" cy="760" r="20" fill="white"/>

  <!-- Frame -->
  <!-- BB -->
  <circle cx="340" cy="760" r="24" fill="white"/>
  <!-- Chainstay rear -->
  <polygon points="200,742 340,748 340,772 200,778" fill="white"/>
  <!-- Chainstay front -->
  <polygon points="340,748 480,742 480,778 340,772" fill="white"/>
  <!-- Seat stay -->
  <polygon points="200,742 294,536 316,546 222,756" fill="white"/>
  <!-- Seat tube -->
  <polygon points="326,756 294,532 316,526 350,754" fill="white"/>
  <!-- Down tube -->
  <polygon points="340,750 468,518 488,534 360,766" fill="white"/>
  <!-- Top tube -->
  <polygon points="296,528 466,500 472,522 302,550" fill="white"/>
  <!-- Fork -->
  <polygon points="466,500 480,742 462,748 450,514" fill="white"/>
  <!-- Saddle -->
  <path d="M252,514 Q292,498 332,510 Q338,522 330,532 Q290,522 252,534Z" fill="white"/>
  <!-- Handlebar -->
  <path d="M446,486 Q472,474 496,488 Q504,500 494,512 Q480,502 462,508 Q444,510 446,486Z" fill="white"/>

  <!-- Rider body – aerodynamic tuck facing right -->
  <!-- Head + aero helmet -->
  <ellipse cx="474" cy="384" rx="48" ry="44" fill="white"/>
  <path d="M474,344 C502,332 532,348 538,376 C522,376 504,368 486,372 C476,360 474,350 474,344Z" fill="white"/>

  <!-- Torso (nearly horizontal) -->
  <path d="M460,426 C420,444 352,462 290,478 C270,484 256,500 260,516 C264,530 282,534 300,528 C368,510 440,490 472,470 C488,460 486,442 460,426Z" fill="white"/>

  <!-- Right arm to handlebar -->
  <path d="M462,440 C474,460 468,486 454,496 C440,504 426,494 428,478 C440,466 450,448 446,432Z" fill="white"/>

  <!-- Left upper leg – power stroke -->
  <path d="M296,506 C280,554 268,606 262,654 C258,678 272,688 292,686 C314,684 324,668 322,644 C328,598 342,550 358,506 C340,490 310,490 296,506Z" fill="white"/>
  <!-- Left lower leg -->
