  <!-- ═══════════════════ RUNNER (right) ═══════════════════ -->
  <!-- Head -->
  <circle cx="762" cy="232" r="62" fill="white"/>

  <!-- Torso – slight forward lean -->
  <path d="M730,290 C706,358 700,438 702,510 C702,534 718,548 740,544 C762,540 774,524 772,500 C770,430 776,354 798,288 C810,254 792,238 768,238 C746,240 736,262 730,290Z" fill="white"/>

  <!-- LEFT ARM – swinging forward, bent up (elbow leads) -->
