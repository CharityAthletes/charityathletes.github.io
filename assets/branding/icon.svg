  <!-- Left foot -->
  <path d="M634,824 C610,850 606,878 620,894 C634,908 668,910 698,898 C722,886 728,864 714,848 C700,832 670,820 634,824Z" fill="white"/>

  <!-- RIGHT LEG – pushing off behind, trailing -->
  <!-- Upper leg -->
  <path d="M742,530 C770,584 790,640 798,694 C804,720 792,740 768,744 C744,748 724,732 718,706 C710,652 692,596 668,544 C686,514 722,512 742,530Z" fill="white"/>
  <!-- Lower leg trailing back -->
